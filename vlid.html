<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>profil</title>
<style>
body{
    background:#000;
    color:#fff;
}

.tag{
  color:white;
  background: black;
  font-size: 10px;
}

.contact{
    display:flex;
    align-items:center;
    gap:20px;
    padding:18px 25px;
    text-decoration:none;
    color:white;
    border-bottom:1px solid #333;
    transition:0.2s;
}

.contact:hover{
    background:#111;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:15px;
    margin-bottom: 8px;
}
.verify{
  width:15px;
  height: 15px;
  margin-bottom: 8px;
}

.verify img{
  width: 100%;
  height:100%;
}

.info{
  height: 10px;
  width: 70pxx;
  position: fixed;
  left: 40%;
  font-size: 15px;
}

.gift{
  height: 10px;
  width: 50px;
  position: fixed;
  left: 70%;
}
.login{
  background: red;
  width: 120px;
  margin-top: 10px;
  color:white;
  border:none;
  border-radius: 10px 5px;
  font-size: 15px;
}

.on{
  background: red;
  width: 99%;
  color:white;
  border:none;
  border-radius: 10px 5px;
  padding: 1px;
  position: static;
  text-align: center;
  font-size: 10px;
}

.stats{
font-size:16px;
}

.price{
font-size:16px;
}

line{
height:2px;
background:#222;
margin:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:3px;
padding:0 8px 20px;
margin-top: 20px;
}

.card{
background:#111;
border:1px solid #555;
position:relative;
overflow:hidden;
}

.card img{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
display:block;
}

.price{
position:absolute;
bottom:10px;
left:12px;
font-size:12px;
text-shadow:0 0 5px black;
}
</style>
</head>
<body>
  <div class="tag">
    <h2>ChatVl</h2>
  </div>
<a class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/gbfnPcC5/New-Project-71-A9-EBC91.png">
    </div>
    <div class="name">ChatVl.id</div>
    <div class="verify">
      <img src="https://i.ibb.co.com/Wv123jL6/New-Project-91-CAD5-C03.png" alt="vetify">
    </div>
    <div class=info>
      <p>ssc : 16k</p>
    </div>
    <div class=gift>
      <p>Gift : 60k</p>
    </div>
</a>

<div class="line"></div>

<div class="gallery">

<div class="card">
<img src="https://i.ibb.co.com/sd220WmK/New-Project-123-88-A9-F5-C.png">
<div class="price">14,6k SSC</div>
</div>

</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart", e=>e.preventDefault());
});
</script>
</body>
</html>
