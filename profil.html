<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>profil</title>
<style>
body{
    background:#000;
    color:#fff;
}

.tag{
  color:white;
  background: black;
  font-size: 10px;
}

.contact{
    display:flex;
    align-items:center;
    gap:20px;
    padding:18px 25px;
    text-decoration:none;
    color:white;
    border-bottom:1px solid #333;
    transition:0.2s;
}

.contact:hover{
    background:#111;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:15px;
    margin-bottom: 8px;
}
.verify{
  width:15px;
  height: 15px;
  margin-bottom: 8px;
}

.verify img{
  width: 100%;
  height:100%;
}

.info{
  height: 10px;
  width: 70pxx;
  position: fixed;
  left: 40%;
  font-size: 15px;
}

.gift{
  height: 10px;
  width: 50px;
  position: fixed;
  left: 70%;
}
.login{
  background: red;
  width: 120px;
  margin-top: 10px;
  color:white;
  border:none;
  border-radius: 10px 5px;
}
</style>
</head>
<body>
  <div class="tag">
    <h2>ChatVl</h2>
  </div>
<a class="contact">
    <div class="avatar">
        <img src="https://i.ibb.co.com/Kp6r3g1Q/IMG-20260616-213153.jpg">
    </div>
    <div class="name">Van_boyy</div>
    <div class="verify">
    </div>
    <div class=info>
      <p>social : 0</p>
    </div>
    <div class=gift>
      <p>Gift : 0</p>
    </div>
</a>

<button onclick="window.location.href='login.html'" class="login">
  Login or register with ChatVl
</button>

<script>
  document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart", e=>e.preventDefault());
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
