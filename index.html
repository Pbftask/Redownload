<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
}

.header{
    background:#111;
    position: fixed;
    padding:8px;
    display:flex;
    align-items:center;
    max-height: 35px;
    width: 95%;
}

.profile{
    display:flex;
    align-items:center;
    gap:10px;
    flex:1;
}

.profile img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    cursor:pointer;
}

.name{
    font-weight:bold;
    cursor:pointer;
    font-size: 15px;
}

.menu-btn{
    font-size:40px;
    cursor:pointer;
    padding:5px 10px;
}

.menu{
    position:fixed;
    top:70px;
    right:10px;
    background:#1c1c1c;
    border-radius:10px;
    display:none;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.5);
    z-index:9999;
}

.menu div{
    padding:10px 20px;
    cursor:pointer;
}

.menu div:hover{
    background:#333;
}

.chat{
    height:85vh;
    overflow-y:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
}

.message{
    max-width:80%;
    padding:8px 10px;
    margin:5px 0;
    border-radius:10px;
    font-size:14px;
    word-wrap:break-word;
    cursor:pointer;
}

.selected{
    outline:2px solid #f19;
}

.left{
    align-self:flex-start;
    background:#1f1f1f;
}

.right{
    align-self:flex-end;
    background:#f00;
}

.time{
    font-size:10px;
    text-align:right;
    margin-top:3px;
    color:#white;
}

.call-card{
    padding:15px;
    border-radius:3px;
    min-width:100px;
    height:00px;
    position:relative;
}

.call-title{
    font-size:15px;
    font-weight:bold;
    margin-top:-5px;
}

.call-status{
    font-size:8x;
    opacity:0.7;
    margin-bottom:10px;
}

.call-time{
    position:absolute;
    right:12px;
    bottom:10px;
    font-size:14px;
}

.input-area{
    position:fixed;
    bottom:0px;
    width:95%;
    display:flex;
    gap:5px;
    padding:8px;
    background:transparent;
}

input[type=text]{
    flex:1;
    border-radius:100px;
    border:none;
    padding:8px 8px;
    background:#222;
    color:white;
    outline:none;
}

button{
    border:none;
    border-radius:50% 10px;
    padding:10px 10px;
    cursor:pointer;
    background:#f66;
    color:white;
}

.end{
  background: white;
  color: black;
  display: flex;
  justify-content: flex-end;
  margin-right: 10px;
  margin-left: 10px;
}

.popup{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.55);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:99;
}

.popup-box{
    width:80%;

    background:white;

    border-radius:16px;

    padding:24px;

    text-align:center;
}

.popup-box h2{
    margin-bottom:12px;
    font-size:22px;
}

.popup-box p{
    color:#555;
    margin-bottom:20px;
    font-size:15px;
}

.close-btn{
    width:100%;
    height:48px;

    border:none;
    border-radius:12px;

    background:black;
    color:white;

    font-size:16px;
}

.chat-image{
    display:block;
    max-width:250px;
    max-height:350px;
    width:auto;
    height:auto;
    border-radius:10px;
}

.image-viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.image-viewer img{
    max-width:95vw;
    max-height:95vh;
    width:auto;
    height:auto;
    object-fit:contain;
}

.close-viewer{
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    color:white;
}

.left{
    align-self:flex-start;
    background:#1f1f1f;
}

.right{
    align-self:flex-end;
    background:#f00;
}

.tumbal{
  background: green;
  width: 100px;
  height: 50px;
}

.chat{
    display:flex;
    flex-direction:column;
    padding:10px;
    overflow-y:auto;
}

.message{
    max-width:75%;
    padding:8px 12px;
    margin:5px 0;
    border-radius:12px;
    word-break:break-word;
}

.me{
    align-self:flex-end;
    background:#f00;
    color:#fff;
    padding:13px;
}

.other{
    align-self:flex-start;
    background:#222;
    color:#fff;
    padding: 13px;
}

.sender{
    font-size:11px;
    opacity:.7;
    margin-bottom:3px;
}

.selected{
    border:2px solid #25d366;
}

.menu{
    display:none;
}

.menu.show{
    display:block;
}
.verify{
  width:15px;
  height: 15px;
}
.verify img{
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<div class="header">
    <div class="profile">
        <img id="profileImg" src="https://i.ibb.co.com/WvQngnDM/IMG-20260613-163402.jpg">
        <div onclick="window.location.href='post.html'" class="name" id="chatName">RIFQY</div>
    <div class="verify">
      <img src="https://i.ibb.co.com/Wv123jL6/New-Project-91-CAD5-C03.png" alt="vetify">
    </div>
    </div>
    <div class="menu-btn" onclick="toggleMenu()">≡</div>
            <button class="btn end">

            <i class="fa-solid fa-phone"></i>

        </button>
</div>

<div class="menu" id="menu">
    <div onclick="enableSelect()">click massage</div>
    <div onclick="editSelected()">Edit massage</div>
    <div onclick="deleteSelected()">delete massage</div>
    <div onclick="deleteAll()">delete all massage</div>
            <div
        onclick="showPopup()">About
        </div>
</div>
<div class="tumbal"></div>

<div class="chat" id="chatBox"></div>
<div class="input-area">
    <button onclick="toggleSide()">↺</button>
<button>
    <i class="fa-solid fa-camera"></i>
</button>
    <input type="text" id="msgInput" placeholder="Ketik pesan" class="sent">
    <button onclick="sendMsg()">sent</button>
</div>

<div class="popup" id="popup">

    <div class="popup-box">

        <h2>
            command
        </h2>

        <p>
            \vc not answers
            \vc answers - 00:00
        </p>
        <button class="close-btn"
        onclick="closePopup()">
            close
            </button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    set,
    onValue,
    remove,
    update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4HuTmEgiowYaBH3doN2INZD5chk9NG-U",
  authDomain: "puki-678bf.firebaseapp.com",
  databaseURL: "https://puki-678bf-default-rtdb.firebaseio.com",
  projectId: "puki-678bf",
  storageBucket: "puki-678bf.firebasestorage.app",
  messagingSenderId: "343647284151",
  appId: "1:343647284151:web:c26e7f5f75235c187a1632"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let selectedMsg = null;
let selectMode = false;

/* ID USER OTOMATIS */
if(!localStorage.getItem("userId")){
    localStorage.setItem(
        "userId",
        "user_" + Math.random().toString(36).slice(2,10)
    );
}

const myId = localStorage.getItem("userId");

/* KIRIM PESAN */
window.sendMsg = function(){

    const input = document.getElementById("msgInput");
    const text = input.value.trim();

    if(text === "") return;

    const msgRef = push(ref(db,"globalChat"));

    set(msgRef,{
        text:text,
        userId:myId,
        time:Date.now()
    });

    input.value = "";
};

/* TAMPILKAN CHAT */
onValue(ref(db,"globalChat"), snapshot=>{

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    const data = snapshot.val();

    if(!data) return;

    Object.keys(data).forEach(key=>{

        const msg = data[key];

        const div = document.createElement("div");

        div.className =
            msg.userId === myId
            ? "message me"
            : "message other";

        div.textContent = msg.text;

        div.onclick = ()=>{

            if(!selectMode) return;

            document
            .querySelectorAll(".selected")
            .forEach(el=>el.classList.remove("selected"));

            div.classList.add("selected");
            selectedMsg = key;
        };

        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
});

/* MENU */
window.toggleMenu = function(){
    document
        .getElementById("menu")
        .classList.toggle("show");
};

/* MODE PILIH */
window.enableSelect = function(){

    selectMode = !selectMode;

    alert(
        selectMode
        ? "Mode pilih aktif"
        : "Mode pilih nonaktif"
    );
};

/* EDIT PESAN */
window.editSelected = function(){

    if(!selectedMsg){
        alert("Pilih pesan terlebih dahulu");
        return;
    }

    const text = prompt("Edit pesan");

    if(!text) return;

    update(
        ref(db,"globalChat/"+selectedMsg),
        {
            text:text
        }
    );
};

/* HAPUS PESAN */
window.deleteSelected = function(){

    if(!selectedMsg){
        alert("Pilih pesan terlebih dahulu");
        return;
    }

    remove(
        ref(db,"globalChat/"+selectedMsg)
    );

    selectedMsg = null;
};

/* HAPUS SEMUA */
window.deleteAll = function(){

    if(confirm("Hapus semua pesan?")){

        remove(
            ref(db,"globalChat")
        );
    }
};

/* POPUP */
window.showPopup = function(){
    document
        .getElementById("popup")
        .style.display = "flex";
};

window.closePopup = function(){
    document
        .getElementById("popup")
        .style.display = "none";
};

/* ENTER UNTUK KIRIM */
document
.getElementById("msgInput")
.addEventListener("keypress",e=>{

    if(e.key==="Enter"){
        sendMsg();
    }
});

document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart", e=>e.preventDefault());
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
